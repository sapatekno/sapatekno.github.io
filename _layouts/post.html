---
layout: default
---

<div class="mt-3 mb-3">
    <!-- breadcrumb -->
    <div class="row" id="breadcrumb">
        <div class="col-12">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb" itemscope itemtype="https://schema.org/BreadcrumbList">
                    <li class="breadcrumb-item" itemprop="itemListElement" itemscope
                        itemtype="https://schema.org/ListItem">
                        <a href="{{ site.url }}" itemprop="item">
                            <span itemprop="name">Home</span>
                        </a>
                        <meta content="1" itemprop="position">
                    </li>
                    <li class="breadcrumb-item" itemprop="itemListElement" itemscope
                        itemtype="https://schema.org/ListItem">
                        <a href="{{ site.url }}" itemprop="item">
                            <span itemprop="name">Blog</span>
                        </a>
                        <meta content="2" itemprop="position">
                    </li>
                    <li aria-current="page" class="breadcrumb-item active" itemprop="itemListElement" itemscope
                        itemtype="https://schema.org/ListItem">
                        <span itemprop="name">{{ page.title }}</span>
                        <meta content="3" itemprop="position">
                    </li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <article itemprop="blogPost" itemscope itemtype="https://schema.org/BlogPosting">
                        <meta content="{{ page.url }}" itemprop="mainEntityOfPage">
                        <span itemprop="publisher" itemscope itemtype="https://schema.org/Organization">
              <meta itemprop="name" content="{{ page.author | default:site.author }}">
              <span itemprop="logo" itemscope itemtype="https://schema.org/ImageObject">
                <meta itemprop="url" content="{{site.url}}/favicon.png">
              </span>
            </span>
                        <h1 itemprop="name headline">{{ page.title }}</h1>
                        <p>
                            oleh
                            <span itemprop="author" itemscope itemtype="https://schema.org/Person">
                <span itemprop="name"><strong>{{ page.author | default: site.author }}</strong></span>
              </span>
                            pada
                            <time %-d %B %Y datetime="{{ page.date | date: "
                            " }}" itemprop="datePublished">
                            {{ page.date | date: "%-d %B %Y" }}
                            </time>
                        </p>

                        {{content}}

                        {% if page.tags %}
                        <small>tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small>
                        {% endif %}

                        {% include disqus.html %}

                    </article>
                </div>
            </div>
        </div>
    </div>
</div>
